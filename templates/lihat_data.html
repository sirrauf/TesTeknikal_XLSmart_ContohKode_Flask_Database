<!doctype html>
<html>
  <head>
    <title>Lihat Data User</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
      }
      th {
        background-color: #f4f4f4;
      }
      tr:hover {
        background-color: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <h2>Data User</h2>

    <table>
      <thead>
        <tr>
          <th>ID User</th>
          <th>Nama</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        {% if data_user %} {% for user in data_user %}
        <tr>
          <td>{{ user.IDUser }}</td>
          <td>{{ user.nama_User }}</td>
          <td>{{ user.Email }}</td>
        </tr>
        {% endfor %} {% else %}
        <tr>
          <td colspan="4">Tidak ada data</td>
        </tr>
        {% endif %}
      </tbody>
    </table>

    <br />
    <a href="/">Kembali ke Input</a>
  </body>
</html>
